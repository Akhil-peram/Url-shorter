<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shrtnr &mdash; URL Shortener</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>shrtnr</h1>
            <p class="subtitle">Paste a long URL to make it short</p>

            <form id="shorten-form">
                <div class="input-group">
                    <input type="url" name="url" placeholder="https://example.com/very/long/url" required autofocus>
                    <button type="submit">Shorten</button>
                </div>
            </form>

            <div id="result" class="{% if not slug and not error %}hidden{% endif %}">
                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}
                {% if slug %}
                    <div class="success">
                        <p class="result-label">Your shortened URL:</p>
                        <div class="result-url">
                            <input type="text" id="short-url" value="{{ base_url }}{{ slug }}" readonly>
                            <button class="copy-btn" onclick="copyUrl()">Copy</button>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>

        <footer>
            <p>Built with FastAPI &middot; Open source</p>
        </footer>
    </div>

    <script>
        document.getElementById("shorten-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            const input = this.querySelector("input[name='url']");
            const resultDiv = document.getElementById("result");
            const url = input.value.trim();

            if (!url) return;

            try {
                const res = await fetch("/shorten", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url }),
                });

                if (!res.ok) {
                    const err = await res.json();
                    resultDiv.innerHTML = `<div class="error">${err.detail || "Something went wrong"}</div>`;
                    resultDiv.classList.remove("hidden");
                    return;
                }

                const data = await res.json();
                resultDiv.innerHTML = `
                    <div class="success">
                        <p class="result-label">Your shortened URL:</p>
                        <div class="result-url">
                            <input type="text" id="short-url" value="${data.short_url}" readonly>
                            <button class="copy-btn" onclick="copyUrl()">Copy</button>
                        </div>
                    </div>
                `;
                resultDiv.classList.remove("hidden");
            } catch {
                resultDiv.innerHTML = `<div class="error">Network error. Please try again.</div>`;
                resultDiv.classList.remove("hidden");
            }
        });

        function copyUrl() {
            const input = document.getElementById("short-url");
            input.select();
            navigator.clipboard.writeText(input.value).then(() => {
                const btn = document.querySelector(".copy-btn");
                btn.textContent = "Copied!";
                setTimeout(() => { btn.textContent = "Copy"; }, 2000);
            });
        }
    </script>
</body>
</html>
